<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fase Mex</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --accent-color: #3b82f6;
            --border-color: #1e293b;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: grid;
            place-items: center;
            min-height: 100vh;
            line-height: 1.6;
        }

        .card-container {
            max-width: 500px;
            padding: 2.5rem;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background-color: rgba(30, 41, 59, 0.5);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: var(--accent-color);
            margin-top: 0;
        }
    </style>
</head>

<body>
    <main class="card-container">
        <h1>Zona Nyaman</h1>
        <p>Ini adalah struktur sederhana yang kamu minta. Tidak ada state yang dikelola, tidak ada arsitektur komponen,
            tidak ada tantangan rekayasa perangkat lunak.</p>
    </main>
</body>

</html>
